name: Desktop release

# Each pushed tag (e.g. `v1.2.3`) produces a GitHub Release in this
# repository: a DMG and updater payload for macOS (per arch), an
# AppImage for Linux x86_64, a SHA256SUMS file, a signed `latest.json`
# manifest, and the matching `latest.json.sig`. The desktop app polls
# this repository's latest release URL on a 10 minute cadence (see
# `app/src/updater.rs`).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

env:
  RELEASE_REPO: ${{ github.repository }}
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  identity:
    name: Compute release identity
    runs-on: ubuntu-22.04
    outputs:
      commit_sha: ${{ steps.identity.outputs.commit_sha }}
      short_sha: ${{ steps.identity.outputs.short_sha }}
      release_id: ${{ steps.identity.outputs.release_id }}
      release_tag: ${{ steps.identity.outputs.release_tag }}
      release_name: ${{ steps.identity.outputs.release_name }}
      cargo_version: ${{ steps.identity.outputs.cargo_version }}
      build_number: ${{ steps.identity.outputs.build_number }}
      published_at: ${{ steps.identity.outputs.published_at }}
    steps:
      - uses: actions/checkout@v4
      - id: identity
        shell: bash
        run: |
          set -euo pipefail
          COMMIT_SHA="${GITHUB_SHA}"
          SHORT_SHA="${GITHUB_SHA::7}"
          RELEASE_ID="${COMMIT_SHA}"
          CARGO_VERSION="$(awk -F '"' '/^version = / { print $2; exit }' app/Cargo.toml)"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          RELEASE_TAG="v${CARGO_VERSION}"
          RELEASE_NAME="AnotherOne Desktop v${CARGO_VERSION}"
          PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo "commit_sha=${COMMIT_SHA}"
            echo "short_sha=${SHORT_SHA}"
            echo "release_id=${RELEASE_ID}"
            echo "release_tag=${RELEASE_TAG}"
            echo "release_name=${RELEASE_NAME}"
            echo "cargo_version=${CARGO_VERSION}"
            echo "build_number=${BUILD_NUMBER}"
            echo "published_at=${PUBLISHED_AT}"
          } >> "$GITHUB_OUTPUT"

  build-macos:
    name: Build macOS (${{ matrix.target }})
    needs: identity
    runs-on: macos-14
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x86_64
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache cargo crates and build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos-${{ matrix.target }}
          cache-on-failure: true
      - name: Set up compiler cache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.ANOTHER_ONE_MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.ANOTHER_ONE_MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.ANOTHER_ONE_MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${MACOS_CERTIFICATE_P12_BASE64:-}" ]]; then
            echo "No Developer ID certificate configured; macOS artifacts will use ad-hoc signing."
            exit 0
          fi
          if [[ -z "${MACOS_CERTIFICATE_PASSWORD:-}" || -z "${MACOS_KEYCHAIN_PASSWORD:-}" ]]; then
            echo "Developer ID certificate import requires ANOTHER_ONE_MACOS_CERTIFICATE_PASSWORD and ANOTHER_ONE_MACOS_KEYCHAIN_PASSWORD." >&2
            exit 1
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/another-one-signing.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          INTERMEDIATE_PATH="$RUNNER_TEMP/DeveloperIDG2CA.cer"
          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          curl -sSfL -o "$INTERMEDIATE_PATH" https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$INTERMEDIATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign
          security import "$CERTIFICATE_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/[ "]//g')
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$MACOS_KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          echo "Codesigning identities visible after import:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
      - name: Run macOS packaging script
        env:
          CARGO_VERSION: ${{ needs.identity.outputs.cargo_version }}
          RELEASE_ID: ${{ needs.identity.outputs.release_id }}
          BUILD_NUMBER: ${{ needs.identity.outputs.build_number }}
          TARGET_TRIPLE: ${{ matrix.target }}
          OUTPUT_DIR: ${{ github.workspace }}/dist/macos-${{ matrix.arch }}
          MACOS_SIGN_IDENTITY: ${{ secrets.ANOTHER_ONE_MACOS_SIGN_IDENTITY }}
          MACOS_SIGN_KEYCHAIN: ${{ runner.temp }}/another-one-signing.keychain-db
          MACOS_NOTARIZE: ${{ secrets.ANOTHER_ONE_MACOS_NOTARIZE || '0' }}
          MACOS_NOTARY_PROFILE: ${{ secrets.ANOTHER_ONE_MACOS_NOTARY_PROFILE }}
          APPLE_ID: ${{ secrets.ANOTHER_ONE_APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.ANOTHER_ONE_APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.ANOTHER_ONE_APP_SPECIFIC_PASSWORD }}
          ANOTHER_ONE_BUILD_FULL_SHA: ${{ needs.identity.outputs.commit_sha }}
          ANOTHER_ONE_UPDATE_TRUST_PUBKEY_HEX: ${{ secrets.ANOTHER_ONE_UPDATE_TRUST_PUBKEY_HEX }}
          ANOTHER_ONE_UPDATE_MANIFEST_URL: https://github.com/${{ env.RELEASE_REPO }}/releases/latest/download/latest.json
        run: |
          mkdir -p "$OUTPUT_DIR"
          ./scripts/package-macos.sh
      - name: Print compiler cache stats
        if: always()
        run: sccache --show-stats
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            dist/macos-${{ matrix.arch }}/AnotherOne-macos-${{ matrix.arch }}-*.dmg
            dist/macos-${{ matrix.arch }}/AnotherOne-macos-${{ matrix.arch }}-*.app.tar.gz

  build-linux:
    name: Build Linux (x86_64)
    needs: identity
    runs-on: ubuntu-22.04
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo crates and build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-x86_64
          cache-on-failure: true
      - name: Set up compiler cache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Install AppImage runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 libxkbcommon-dev libxkbcommon-x11-dev libxcb-xkb1
      - name: Install modern patchelf
        run: |
          set -euo pipefail
          curl -sSfL \
            https://github.com/NixOS/patchelf/releases/download/0.18.0/patchelf-0.18.0-x86_64.tar.gz \
            -o "$RUNNER_TEMP/patchelf.tar.gz"
          tar -xzf "$RUNNER_TEMP/patchelf.tar.gz" -C "$RUNNER_TEMP"
          sudo install -m 0755 "$RUNNER_TEMP/bin/patchelf" /usr/local/bin/patchelf
          patchelf --version
      - name: Run Linux packaging script
        env:
          ALLOW_HOST_BUILD: "1"
          RELEASE_ID: ${{ needs.identity.outputs.release_id }}
          OUTPUT_DIR: ${{ github.workspace }}/dist/linux-x86_64
          ANOTHER_ONE_BUILD_FULL_SHA: ${{ needs.identity.outputs.commit_sha }}
          ANOTHER_ONE_UPDATE_TRUST_PUBKEY_HEX: ${{ secrets.ANOTHER_ONE_UPDATE_TRUST_PUBKEY_HEX }}
          ANOTHER_ONE_UPDATE_MANIFEST_URL: https://github.com/${{ env.RELEASE_REPO }}/releases/latest/download/latest.json
        run: |
          mkdir -p "$OUTPUT_DIR"
          ./scripts/package-linux.sh
      - name: Print compiler cache stats
        if: always()
        run: sccache --show-stats
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: |
            dist/linux-x86_64/AnotherOne-linux-x86_64-*.AppImage

  publish:
    name: Publish release
    needs:
      - identity
      - build-macos
      - build-linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Stage release artifacts
        id: stage
        env:
          RELEASE_ID: ${{ needs.identity.outputs.release_id }}
          SHORT_SHA: ${{ needs.identity.outputs.short_sha }}
          CARGO_VERSION: ${{ needs.identity.outputs.cargo_version }}
          BUILD_NUMBER: ${{ needs.identity.outputs.build_number }}
          PUBLISHED_AT: ${{ needs.identity.outputs.published_at }}
          RELEASE_TAG: ${{ needs.identity.outputs.release_tag }}
          RELEASE_REPO_OUT: ${{ env.RELEASE_REPO }}
        run: |
          set -euo pipefail
          RELEASE_DIR="${{ github.workspace }}/release"
          mkdir -p "$RELEASE_DIR"
          shopt -s nullglob
          for f in dist/*/AnotherOne-*; do
            cp -f "$f" "$RELEASE_DIR/"
          done
          ls -la "$RELEASE_DIR"
          # SHA256SUMS over every staged asset (alphabetical for
          # reproducibility).
          ( cd "$RELEASE_DIR" && find . -maxdepth 1 -type f -name 'AnotherOne-*' -print0 \
              | sort -z \
              | xargs -0 sha256sum > SHA256SUMS )
          # Build latest.json from staged assets.
          python3 scripts/release/build_manifest.py \
            --release-dir "$RELEASE_DIR" \
            --release-id "$RELEASE_ID" \
            --short-sha "$SHORT_SHA" \
            --cargo-version "$CARGO_VERSION" \
            --build-number "$BUILD_NUMBER" \
            --published-at "$PUBLISHED_AT" \
            --release-repo "$RELEASE_REPO_OUT" \
            --release-tag "$RELEASE_TAG" \
            --output "$RELEASE_DIR/latest.json"
          echo "release_dir=$RELEASE_DIR" >> "$GITHUB_OUTPUT"
      - name: Sign latest.json
        env:
          ED25519_PRIVKEY_HEX: ${{ secrets.ANOTHER_ONE_UPDATE_SIGN_PRIVKEY_HEX }}
        run: |
          set -euo pipefail
          if [[ -z "${ED25519_PRIVKEY_HEX:-}" ]]; then
            echo "ANOTHER_ONE_UPDATE_SIGN_PRIVKEY_HEX secret is not set; cannot sign latest.json." >&2
            exit 1
          fi
          python3 -m pip install --quiet "PyNaCl>=1.5"
          python3 scripts/release/sign_manifest.py \
            --manifest "${{ steps.stage.outputs.release_dir }}/latest.json" \
            --signature "${{ steps.stage.outputs.release_dir }}/latest.json.sig"
      - name: Publish to this repository release
        env:
          GH_TOKEN: ${{ secrets.ANOTHER_ONE_RELEASE_TOKEN }}
          RELEASE_TAG: ${{ needs.identity.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.identity.outputs.release_name }}
          CARGO_VERSION: ${{ needs.identity.outputs.cargo_version }}
          BUILD_NUMBER: ${{ needs.identity.outputs.build_number }}
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "ANOTHER_ONE_RELEASE_TOKEN secret is not set." >&2
            exit 1
          fi
          RELEASE_DIR="${{ steps.stage.outputs.release_dir }}"
          gh release create "$RELEASE_TAG" \
            --repo "$RELEASE_REPO" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_NAME" \
            --notes "AnotherOne Desktop v${CARGO_VERSION} (build ${BUILD_NUMBER}) — ${GITHUB_SHA}." \
            "$RELEASE_DIR"/AnotherOne-* \
            "$RELEASE_DIR"/SHA256SUMS \
            "$RELEASE_DIR"/latest.json \
            "$RELEASE_DIR"/latest.json.sig
