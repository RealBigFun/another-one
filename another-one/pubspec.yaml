name: another_one
description: "AnotherOne — unified GUI for desktop and mobile."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.11.5

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  web_socket_channel: ^3.0.3
  xterm: ^4.0.0
  shared_preferences: ^2.2.0
  # Resolves platform-appropriate paths for another-one-bridge to persist the
  # iroh secret key. Without stable storage, the phone's EndpointId
  # would regenerate on every app restart, breaking TOFU pairing.
  path_provider: ^2.1.3
  # Native folder picker for the desktop "Add project" affordance.
  # GPUI uses `cx.prompt_for_paths` for the same flow; file_picker
  # is the cross-platform equivalent (GTK on Linux, NSOpenPanel on
  # macOS, IFileDialog on Windows).
  file_picker: ^8.0.0
  # SVG renderer — bundles the same `assets/icons/icons__*.svg`
  # set the GPUI desktop ships so glyphs (pin, chevron, github,
  # qr-code, etc.) render bit-identically across both UIs.
  flutter_svg: ^2.0.10
  mobile_scanner: ^5.2.0
  # External-URL launcher — opens GitHub project links from the
  # sidebar/titlebar/project page. Mirrors the desktop's
  # `core::platform::HeadlessPlatform::open_external_url` →
  # `xdg-open` / `open` / `start` flow without re-implementing the
  # platform-specific dance per OS.
  url_launcher: ^6.2.0
  another_one_bridge:
    path: rust_builder
  flutter_rust_bridge: 2.12.0
  # Required for FRB's generated Dart tagged-union classes (one per
  # Rust enum passed across the bridge — e.g. `WorkerReply`).
  freezed_annotation: ^3.1.0
  # State management: riverpod 2.5+. Plain `setState` doesn't scale
  # to a 30k-LOC desktop app with multi-connection lifecycles,
  # modal stacks, and per-tab attach scopes. See
  # `~/.claude/plans/flutter-gui-architecture.md` §3 for the
  # provider taxonomy this scaffolds.
  #
  # Codegen (`riverpod_annotation` + `riverpod_generator`) is
  # currently held back: `riverpod_generator` 2.6.x requires
  # `source_gen ^2.0.0`, but `freezed` 3.2.x (used by FRB) needs
  # `source_gen >=3.0.0`. Once a riverpod_generator release pins
  # source_gen 3 (tracked upstream), wire codegen in. Until then
  # the providers are written by hand — that's fine.
  flutter_riverpod: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  # FRB-generated tagged-union classes use the freezed codegen; see
  # `freezed_annotation` above for the runtime side.
  freezed: ^3.2.5
  build_runner: ^2.4.13

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    # GPUI-shipped icon set — copied verbatim from
    # `desktop/assets/icons/` so sidebar + titlebar glyphs render
    # bit-identically across the two UIs.
    - assets/icons/
    # Branded provider logos (Claude / Codex / Cursor / Gemini /
    # etc.). Used by the new-task / add-agent / settings agent
    # pages.
    - assets/agent-icons/

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # GPUI desktop's only font — Lilex Nerd Font Mono. Used for
  # every label, glyph, and modal. Bundled here so the app
  # renders identically on hosts that don't have it installed
  # system-wide.
  fonts:
    - family: Lilex
      fonts:
        - asset: assets/fonts/LilexNerdFontMono-Regular.ttf
        - asset: assets/fonts/LilexNerdFontMono-Italic.ttf
          style: italic
        - asset: assets/fonts/LilexNerdFontMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/LilexNerdFontMono-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/LilexNerdFontMono-Bold.ttf
          weight: 700
        - asset: assets/fonts/LilexNerdFontMono-BoldItalic.ttf
          weight: 700
          style: italic
