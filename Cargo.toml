[package]
name = "three-column"
version = "0.1.0"
edition = "2021"
description = "Three-column resizable desktop layout using Zed GPUI"

# GPUI: https://github.com/zed-industries/zed/tree/main/crates/gpui
# Using the crates.io release (published from that tree). Pin `rev = "…"` if you need git main.
[dependencies]
anyhow = "1"
gpui = "0.2.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dirs = "5"
uuid = { version = "1", features = ["v4"] }
alacritty_terminal = "0.26"
portable-pty = "0.9"
log = "0.4"
polling = "3"
